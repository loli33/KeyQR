<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Details</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:#f4f6f9;
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
        }

        .card{
            background:white;
            width:400px;
            padding:30px;
            border-radius:12px;
            box-shadow:0 8px 20px rgba(0,0,0,0.15);
        }

        h1{
            text-align:center;
            color:#1f4e79;
            margin-bottom:25px;
        }

        .info{
            margin:18px 0;
            font-size:18px;
        }

        .label{
            font-weight:bold;
            color:#333;
        }

        .value{
            color:#555;
            margin-left:10px;
        }

        hr{
            margin:12px 0;
            border:none;
            border-top:1px solid #ddd;
        }

        .buttons{
            margin-top:25px;
            display:flex;
            flex-direction:column;
            gap:12px;
        }

        .btn{
            display:block;
            text-align:center;
            text-decoration:none;
            padding:12px;
            border-radius:8px;
            font-size:16px;
            font-weight:bold;
            color:white;
            transition:0.3s;
        }

        .call{
            background:#007BFF;
        }

        .whatsapp{
            background:#25D366;
        }

        .email{
            background:#EA4335;
        }

        .btn:hover{
            opacity:0.9;
            transform:translateY(-2px);
        }

        @media(max-width:450px){
            .card{
                width:90%;
            }
        }
    </style>
</head>

<body>

<div class="card">

    <h1>Personal Details</h1>

    <div class="info">
        <span class="label">👤 Name :</span>
        <span class="value">Sugundan M M</span>
    </div>

    <hr>

    <div class="info">
        <span class="label">📍 Location :</span>
        <span class="value">Chennai, Tamil Nadu, India</span>
    </div>

    <hr>

    <div class="info">
        <span class="label">📞 Contact :</span>
        <span class="value">+91 8870491287</span>
    </div>

    <hr>

    <div class="info">
        <span class="label">📧 Email :</span>
        <span class="value">sugundanmm33@gmail.com</span>
    </div>

    <hr>

    <div class="buttons">

        <a href="tel:+918870491287" class="btn call">
            📞 Call Me
        </a>

        <a href="https://wa.me/918870491287" target="_blank" class="btn whatsapp">
            💬 WhatsApp
        </a>

        <a href="mailto:sugundanmm33@gmail.com" class="btn email">
            📧 Email Me
        </a>

    </div>

</div>

</body>
</html>
